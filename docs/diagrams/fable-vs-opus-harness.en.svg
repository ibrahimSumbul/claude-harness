<svg width="100%" viewBox="0 0 760 340" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Fable 5 versus Opus + harness — a different path to the same gains</title>
  <desc>A three-row comparison. The three gains a stronger model provides — getting past the context wall, reviewing a change, weighing a decision — reached instead through the harness's organization. Left, Fable 5 (one bigger model, gray): a 1M context window defers the wall; internal self-review is correlated and opaque; one reasoning stream, no jury. Right, Opus + harness (green): devir gets ahead of the wall; adversarial-review collapses disagreement to kill false positives; supervisor-review is a jury that keeps divergence. There is a real token and latency cost, and the multi-pass gain is not eval-proven yet.</desc>

  <text x="24" y="28" font-size="15" font-weight="600" fill="#20201e">Three gains: a bigger model vs Opus + harness</text>

  <text x="310" y="58" font-size="13" font-weight="600" fill="#55554f" text-anchor="middle">Fable 5</text>
  <text x="310" y="74" font-size="12" fill="#73726c" text-anchor="middle">one bigger model</text>
  <text x="600" y="58" font-size="13" font-weight="600" fill="#1D9E75" text-anchor="middle">Opus + harness</text>
  <text x="600" y="74" font-size="12" fill="#73726c" text-anchor="middle">organization layer</text>

  <line x1="455" y1="84" x2="455" y2="292" stroke="#a8a79f" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="24" y="113" font-size="13" font-weight="600" fill="#55554f">Past the<tspan x="24" dy="1.25em">wall</tspan></text>
  <rect x="180" y="88" width="260" height="58" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="310" y="112" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">1M context window</text>
  <text x="310" y="131" font-size="12" fill="#5f5e5a" text-anchor="middle">defers the wall</text>
  <rect x="470" y="88" width="260" height="58" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="112" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">devir handoff</text>
  <text x="600" y="131" font-size="12" fill="#0F6E56" text-anchor="middle">gets ahead of it</text>

  <text x="24" y="185" font-size="13" font-weight="600" fill="#55554f">Reviewing<tspan x="24" dy="1.25em">a change</tspan></text>
  <rect x="180" y="160" width="260" height="58" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="310" y="184" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">internal self-review</text>
  <text x="310" y="203" font-size="12" fill="#5f5e5a" text-anchor="middle">correlated · opaque</text>
  <rect x="470" y="160" width="260" height="58" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="184" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">adversarial-review</text>
  <text x="600" y="203" font-size="12" fill="#0F6E56" text-anchor="middle">collapses disagreement</text>

  <text x="24" y="257" font-size="13" font-weight="600" fill="#55554f">Weighing<tspan x="24" dy="1.25em">a decision</tspan></text>
  <rect x="180" y="232" width="260" height="58" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="310" y="256" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">one reasoning stream</text>
  <text x="310" y="275" font-size="12" fill="#5f5e5a" text-anchor="middle">single view, no jury</text>
  <rect x="470" y="232" width="260" height="58" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="256" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">supervisor-review</text>
  <text x="600" y="275" font-size="12" fill="#0F6E56" text-anchor="middle">jury keeps divergence</text>

  <text x="377" y="320" font-size="12" font-style="italic" fill="#5f5e5a" text-anchor="middle">A different path to the same three gains — real token and latency cost, eval pending.</text>
</svg>
