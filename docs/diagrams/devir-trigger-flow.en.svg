<svg width="100%" viewBox="0 0 880 452" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>devir — user triggers and the background hook flow</title>
  <desc>Three flows: in the middle, the user's manually triggered session/devir path (/devir, new session, /devir-resume, consume); on the left, the /devir-land branch off Session A (if a slice finished BEFORE the limit, commit+push in the same session, no force-push, no note/memory writes, no continuity); on the right, the automatic L3 hook net (autotrigger 260k nudge, precompact dump+draft, sessionstart RESUME inject/banner). Hooks are advisory; persistent layers are L1 memory + L2 git note. Source: skills/devir, skills/devir-resume, skills/devir-land, hooks/devir-*.py, settings.example.json. English mirror of devir-trigger-flow.svg (Turkish is canonical).</desc>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1.5 L8 5 L1 8.5 Z" fill="#73726c"/>
    </marker>
    <marker id="ah-amber" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1.5 L8 5 L1 8.5 Z" fill="#BA7517"/>
    </marker>
  </defs>

  <!-- viewBox 0-origin; all drawing shifted into positive space via translate(200,0) (no negative-origin render risk) -->
  <g transform="translate(200,0)">

  <text x="20" y="26" font-size="16" font-weight="600" fill="#20201e">devir — who triggers what, and what runs in the background</text>

  <!-- legend -->
  <rect x="20" y="40" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="40" y="51" font-size="12" fill="#55554f">user (manual)</text>
  <rect x="190" y="40" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="210" y="51" font-size="12" fill="#55554f">L3 hook (automatic · advisory)</text>

  <!-- column headers -->
  <text x="-100" y="74" font-size="12" font-weight="600" fill="#55554f" text-anchor="middle" letter-spacing="0.5">FINISHED SLICE · LAND</text>
  <text x="200" y="74" font-size="12" font-weight="600" fill="#55554f" text-anchor="middle" letter-spacing="0.5">USER · SESSION</text>
  <text x="475" y="74" font-size="12" font-weight="600" fill="#55554f" text-anchor="middle" letter-spacing="0.5">L3 HOOK NET</text>

  <!-- main column (left) -->
  <rect x="110" y="84" width="180" height="50" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="200" y="105" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">Session A</text>
  <text x="200" y="122" font-size="12" fill="#5f5e5a" text-anchor="middle">context ~260k → growing</text>

  <rect x="110" y="160" width="180" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="200" y="181" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">/devir  (manual)</text>
  <text x="200" y="198" font-size="12" fill="#0F6E56" text-anchor="middle">write L1+L2 → commit</text>

  <rect x="110" y="236" width="180" height="50" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="200" y="257" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">► new session</text>
  <text x="200" y="274" font-size="12" fill="#5f5e5a" text-anchor="middle">fresh context</text>

  <rect x="110" y="312" width="180" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="200" y="333" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">/devir-resume</text>
  <text x="200" y="350" font-size="12" fill="#0F6E56" text-anchor="middle">staleness + approval</text>

  <rect x="110" y="388" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="200" y="406" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">consume</text>
  <text x="200" y="422" font-size="12" fill="#0F6E56" text-anchor="middle">open → consumed</text>

  <!-- /devir-land: branch off Session A — slice finished BEFORE the limit, SAME session -->
  <rect x="-185" y="156" width="170" height="58" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="-100" y="177" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">/devir-land</text>
  <text x="-100" y="194" font-size="11" fill="#0F6E56" text-anchor="middle">commit+push · no force</text>
  <text x="-100" y="208" font-size="11" fill="#0F6E56" text-anchor="middle">same session · no note/memory</text>
  <!-- branch: Session A → /devir-land (orthogonal) -->
  <path d="M110 109 H-100 V154" fill="none" stroke="#73726c" stroke-width="1.4" marker-end="url(#ah)"/>
  <text x="-5" y="102" font-size="11" font-style="italic" fill="#5f5e5a" text-anchor="middle">slice DONE (before limit)</text>

  <!-- right column (hooks) -->
  <rect x="385" y="112" width="180" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="475" y="130" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">autotrigger</text>
  <text x="475" y="146" font-size="12" fill="#854F0B" text-anchor="middle">≥260k → nudge</text>

  <rect x="385" y="174" width="180" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="475" y="192" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">precompact</text>
  <text x="475" y="208" font-size="12" fill="#854F0B" text-anchor="middle">dump + draft</text>

  <rect x="385" y="236" width="180" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="475" y="254" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">sessionstart</text>
  <text x="475" y="270" font-size="12" fill="#854F0B" text-anchor="middle">RESUME inject / banner</text>

  <!-- main vertical flow -->
  <line x1="200" y1="134" x2="200" y2="158" stroke="#73726c" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="200" y1="210" x2="200" y2="234" stroke="#73726c" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="200" y1="286" x2="200" y2="310" stroke="#73726c" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="200" y1="362" x2="200" y2="386" stroke="#73726c" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- session tokens read by autotrigger (condition) -->
  <line x1="290" y1="110" x2="381" y2="126" stroke="#a8a79f" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <!-- autotrigger nudges /devir (advisory, dashed amber) -->
  <line x1="430" y1="156" x2="294" y2="178" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ah-amber)"/>
  <text x="356" y="162" font-size="11" font-style="italic" fill="#854F0B" text-anchor="middle">advisory</text>
  <!-- precompact draft feeds sessionstart -->
  <line x1="475" y1="218" x2="475" y2="234" stroke="#BA7517" stroke-width="1.5" marker-end="url(#ah-amber)"/>
  <!-- sessionstart injects into new session -->
  <line x1="383" y1="256" x2="294" y2="258" stroke="#BA7517" stroke-width="1.5" marker-end="url(#ah-amber)"/>

  </g>
</svg>
