<svg width="100%" viewBox="0 0 760 340" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Fable 5 ile Opus + harness — aynı kazanımlara farklı yol</title>
  <desc>Üç satırlık karşılaştırma. Daha güçlü bir modelin verdiği üç kazanım — context duvarının ötesi, bir değişikliği incelemek, bir kararı tartmak — harness'ta organizasyonla geri alınıyor. Solda Fable 5 (tek büyük model, gri): 1M context erteler; iç self-review korelasyonlu/opak; tek akıl-yürütme akışı, jüri yok. Sağda Opus + harness (yeşil): devir duvarın önüne geçer; adversarial-review anlaşmazlığı çökertir (sahte-pozitifi öldürür); supervisor-review bir jüridir, ayrışmayı korur. Gerçek token/latency maliyeti var ve çok-pass kazancı henüz eval ile kanıtlanmadı.</desc>

  <text x="24" y="28" font-size="15" font-weight="600" fill="#20201e">Üç kazanım: daha büyük model vs Opus + harness</text>

  <text x="310" y="58" font-size="13" font-weight="600" fill="#55554f" text-anchor="middle">Fable 5</text>
  <text x="310" y="74" font-size="12" fill="#73726c" text-anchor="middle">tek büyük model</text>
  <text x="600" y="58" font-size="13" font-weight="600" fill="#1D9E75" text-anchor="middle">Opus + harness</text>
  <text x="600" y="74" font-size="12" fill="#73726c" text-anchor="middle">organizasyon katmanı</text>

  <line x1="455" y1="84" x2="455" y2="292" stroke="#a8a79f" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="24" y="113" font-size="13" font-weight="600" fill="#55554f">Duvarın<tspan x="24" dy="1.25em">ötesi</tspan></text>
  <rect x="180" y="88" width="260" height="58" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="310" y="112" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">1M context penceresi</text>
  <text x="310" y="131" font-size="12" fill="#5f5e5a" text-anchor="middle">erteler, kaldırmaz</text>
  <rect x="470" y="88" width="260" height="58" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="112" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">devir devir-teslimi</text>
  <text x="600" y="131" font-size="12" fill="#0F6E56" text-anchor="middle">duvarın önüne geçer</text>

  <text x="24" y="185" font-size="13" font-weight="600" fill="#55554f">Bir<tspan x="24" dy="1.25em">değişiklik</tspan></text>
  <rect x="180" y="160" width="260" height="58" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="310" y="184" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">iç self-review</text>
  <text x="310" y="203" font-size="12" fill="#5f5e5a" text-anchor="middle">korelasyonlu · opak</text>
  <rect x="470" y="160" width="260" height="58" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="184" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">adversarial-review</text>
  <text x="600" y="203" font-size="12" fill="#0F6E56" text-anchor="middle">anlaşmazlığı çökertir</text>

  <text x="24" y="257" font-size="13" font-weight="600" fill="#55554f">Bir<tspan x="24" dy="1.25em">karar</tspan></text>
  <rect x="180" y="232" width="260" height="58" rx="8" fill="#F4F2EC" stroke="#B4B2A9" stroke-width="1"/>
  <text x="310" y="256" font-size="14" font-weight="500" fill="#20201e" text-anchor="middle">tek akıl-yürütme akışı</text>
  <text x="310" y="275" font-size="12" fill="#5f5e5a" text-anchor="middle">tek bakış, jüri yok</text>
  <rect x="470" y="232" width="260" height="58" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="256" font-size="14" font-weight="500" fill="#06463a" text-anchor="middle">supervisor-review</text>
  <text x="600" y="275" font-size="12" fill="#0F6E56" text-anchor="middle">jüri ayrışmayı korur</text>

  <text x="377" y="320" font-size="12" font-style="italic" fill="#5f5e5a" text-anchor="middle">Aynı üç kazanıma farklı yoldan — gerçek token/latency maliyeti, eval bekliyor.</text>
</svg>
